spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/preva}
    username: ${DATABASE_USERNAME:preva}
    password: ${DATABASE_PASSWORD:preva}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:dGhpcy1pcy1hLXZlcnktbG9uZy1zZWNyZXQta2V5LWZvci1wcmV2YS1tdnAtand0LXRva2VucyE=}
  access-expiry-ms: 900000
  refresh-expiry-ms: 604800000

cors:
  allowed-origins: ${CORS_ORIGINS:http://localhost:3000}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
